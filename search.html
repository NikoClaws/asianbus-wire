<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Results | AsianBus News</title>
    <meta name="description" content="Search K-Pop news, dating rumors, controversies, and more on AsianBus News.">
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9902886208446482" crossorigin="anonymous"></script>
    <style>
        .search-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 1.5rem 4rem;
        }
        
        .search-header {
            margin-bottom: 1.5rem;
        }
        
        .search-header h1 {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--gray-800);
        }
        
        .search-header h1 span {
            color: var(--primary);
        }
        
        .search-meta {
            color: var(--gray-500);
            font-size: 0.9rem;
            margin-top: 0.25rem;
        }
        
        .search-box {
            margin-bottom: 1.5rem;
        }
        
        .search-box input {
            width: 100%;
            padding: 0.9rem 1.25rem;
            border-radius: var(--radius);
            border: 2px solid var(--gray-200);
            background: white;
            color: var(--gray-800);
            font-size: 1rem;
            transition: all 0.2s;
        }
        
        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(255, 45, 120, 0.1);
        }
        
        .search-filters {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }
        
        .filter-btn {
            padding: 0.5rem 1rem;
            border-radius: 20px;
            border: 1px solid var(--gray-200);
            background: white;
            color: var(--gray-600);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .filter-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        
        .filter-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }
        
        /* Match article-list-item styling from main site */
        .search-results {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .result-card {
            display: flex;
            gap: 1rem;
            background: white;
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: box-shadow 0.2s, transform 0.2s;
            text-decoration: none;
        }
        
        .result-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }
        
        .result-image {
            width: 140px;
            min-width: 140px;
            height: 90px;
            object-fit: cover;
            object-position: center 20%;
            background: var(--gray-100);
        }
        
        .result-content {
            flex: 1;
            padding: 0.75rem 1rem 0.75rem 0;
            min-width: 0;
        }
        
        .result-category {
            font-size: 0.6rem;
            font-weight: 700;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.35rem;
            display: inline-block;
        }
        
        .result-title {
            font-size: 0.95rem;
            font-weight: 600;
            line-height: 1.4;
            color: var(--gray-800);
            margin: 0 0 0.35rem 0;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .result-title mark {
            background: transparent;
            color: var(--primary);
            font-weight: 700;
        }
        
        .result-excerpt {
            font-size: 0.8rem;
            color: var(--gray-500);
            line-height: 1.5;
            margin: 0;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .no-results {
            text-align: center;
            padding: 4rem 2rem;
            background: white;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }
        
        .no-results h2 {
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
            color: var(--gray-700);
        }
        
        .no-results p {
            margin-bottom: 1.5rem;
            color: var(--gray-500);
        }
        
        .trending-searches {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .trending-searches a {
            padding: 0.5rem 1rem;
            background: var(--gray-100);
            border-radius: 20px;
            color: var(--primary);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .trending-searches a:hover {
            background: var(--primary);
            color: white;
        }
        
        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--gray-500);
        }
        
        @media (max-width: 600px) {
            .result-image {
                width: 100px;
                min-width: 100px;
                height: 70px;
            }
            
            .result-title {
                font-size: 0.9rem;
            }
            
            .result-excerpt {
                display: none;
            }
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="header-top">
            <a href="index.html" class="logo">
                <img src="logo.png" alt="AsianBus K-Pop News" class="logo-img">
            </a>
            <div class="header-search">
                <input type="search" placeholder="Search K-Pop news..." id="header-search-input" autocomplete="off">
            </div>
        </div>
        <nav class="header-nav">
            <a href="index.html">Home</a>
            <a href="breaking.html">Breaking</a>
            <a href="dating.html">Dating</a>
            <a href="controversy.html">Controversy</a>
            <a href="music.html">Music</a>
            <a href="kdrama.html">K-Drama</a>
        </nav>
    </header>

    <main class="search-container">
        <div class="search-header">
            <h1>Search Results <span id="query-display"></span></h1>
            <p class="search-meta" id="results-count"></p>
        </div>
        
        <div class="search-box">
            <input type="search" placeholder="Search articles, artists, topics..." id="search-input" autocomplete="off" autofocus>
        </div>
        
        <div class="search-filters" id="filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="Breaking News">Breaking</button>
            <button class="filter-btn" data-filter="Dating">Dating</button>
            <button class="filter-btn" data-filter="Controversy">Controversy</button>
            <button class="filter-btn" data-filter="Music">Music</button>
            <button class="filter-btn" data-filter="K-Drama">K-Drama</button>
        </div>
        
        <div id="results-container">
            <div class="loading">Loading...</div>
        </div>
    </main>

    <script>
        let articles = [];
        let currentFilter = 'all';
        
        fetch('search-index.json')
            .then(res => res.json())
            .then(data => {
                articles = data;
                const urlParams = new URLSearchParams(window.location.search);
                const query = urlParams.get('q') || '';
                if (query) {
                    document.getElementById('search-input').value = query;
                    document.getElementById('header-search-input').value = query;
                    performSearch(query);
                } else {
                    showTrendingSearches();
                }
            })
            .catch(err => {
                document.getElementById('results-container').innerHTML = 
                    '<div class="no-results"><h2>Error loading articles</h2></div>';
            });
        
        const searchInput = document.getElementById('search-input');
        const headerSearchInput = document.getElementById('header-search-input');
        
        let debounceTimer;
        searchInput.addEventListener('input', (e) => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                const query = e.target.value.trim();
                headerSearchInput.value = query;
                if (query.length >= 2) {
                    performSearch(query);
                    updateURL(query);
                } else if (query.length === 0) {
                    showTrendingSearches();
                    updateURL('');
                }
            }, 150);
        });
        
        headerSearchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                searchInput.value = e.target.value;
                performSearch(e.target.value.trim());
                updateURL(e.target.value.trim());
            }
        });
        
        document.getElementById('filters').addEventListener('click', (e) => {
            if (e.target.classList.contains('filter-btn')) {
                document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
                e.target.classList.add('active');
                currentFilter = e.target.dataset.filter;
                performSearch(searchInput.value.trim());
            }
        });
        
        function updateURL(query) {
            const url = query ? `?q=${encodeURIComponent(query)}` : window.location.pathname;
            history.replaceState(null, '', url);
        }
        
        function performSearch(query) {
            const container = document.getElementById('results-container');
            const queryDisplay = document.getElementById('query-display');
            const countDisplay = document.getElementById('results-count');
            
            queryDisplay.textContent = query ? `for "${query}"` : '';
            
            if (!query || query.length < 2) {
                showTrendingSearches();
                return;
            }
            
            const terms = query.toLowerCase().split(/\s+/);
            
            let results = articles.filter(article => {
                const searchText = (article.title + ' ' + article.excerpt + ' ' + article.category).toLowerCase();
                const matchesTerms = terms.every(term => searchText.includes(term));
                const matchesFilter = currentFilter === 'all' || article.category === currentFilter;
                return matchesTerms && matchesFilter;
            });
            
            results.sort((a, b) => {
                const aTitle = a.title.toLowerCase();
                const bTitle = b.title.toLowerCase();
                const aInTitle = terms.every(t => aTitle.includes(t));
                const bInTitle = terms.every(t => bTitle.includes(t));
                if (aInTitle && !bInTitle) return -1;
                if (bInTitle && !aInTitle) return 1;
                return 0;
            });
            
            countDisplay.textContent = `${results.length} article${results.length !== 1 ? 's' : ''} found`;
            
            if (results.length === 0) {
                container.innerHTML = `
                    <div class="no-results">
                        <h2>No results found</h2>
                        <p>Try different keywords or browse by category</p>
                        <div class="trending-searches">
                            <a href="?q=BTS">BTS</a>
                            <a href="?q=BLACKPINK">BLACKPINK</a>
                            <a href="?q=dating">Dating</a>
                            <a href="?q=scandal">Scandal</a>
                        </div>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = '<div class="search-results">' + results.map(article => {
                let title = article.title;
                terms.forEach(term => {
                    const regex = new RegExp(`(${escapeRegex(term)})`, 'gi');
                    title = title.replace(regex, '<mark>$1</mark>');
                });
                
                return `
                    <a href="${article.file}" class="result-card">
                        <img src="${article.image}" alt="" class="result-image" loading="lazy" onerror="this.src='images/default.jpg'">
                        <div class="result-content">
                            <span class="result-category">${article.category}</span>
                            <h3 class="result-title">${title}</h3>
                            <p class="result-excerpt">${article.excerpt}</p>
                        </div>
                    </a>
                `;
            }).join('') + '</div>';
        }
        
        function showTrendingSearches() {
            document.getElementById('results-count').textContent = '';
            document.getElementById('results-container').innerHTML = `
                <div class="no-results">
                    <h2>🔥 Trending Searches</h2>
                    <p>Start typing or try a popular search</p>
                    <div class="trending-searches">
                        <a href="?q=BTS">BTS</a>
                        <a href="?q=BLACKPINK">BLACKPINK</a>
                        <a href="?q=ENHYPEN">ENHYPEN</a>
                        <a href="?q=dating">Dating</a>
                        <a href="?q=scandal">Scandal</a>
                        <a href="?q=Netflix">Netflix</a>
                    </div>
                </div>
            `;
        }
        
        function escapeRegex(s) {
            return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }
    </script>
</body>
</html>
